<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BSC5 亮星星表 · 3D 天球</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000810;
      overflow: hidden;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
      color: #ccc;
      user-select: none;
      -webkit-user-select: none;
    }
    canvas { display: block; }

    /* === 顶部信息栏 === */
    #ui-top {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      padding: 16px 20px;
      display: flex; justify-content: space-between; align-items: flex-start;
      pointer-events: none;
    }
    #ui-top > * { pointer-events: auto; }
    #title-block h1 {
      font-size: 1.3rem; font-weight: 600; color: #fff;
      letter-spacing: .04em;
      text-shadow: 0 0 16px rgba(180,200,255,.35);
    }
    #title-block .sub {
      font-size: .7rem; color: #667; margin-top: 3px;
    }
    #stats {
      background: rgba(8,12,28,.72); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.08); border-radius: 10px;
      padding: 10px 14px; font-size: .76rem; line-height: 1.7; min-width: 130px;
    }
    #stats span { color: #c8d8ff; font-weight: 500; }

    /* === 加载遮罩 === */
    #loading {
      position: fixed; inset: 0; background: #000810;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 100; transition: opacity .6s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #spinner {
      width: 38px; height: 38px;
      border: 2px solid rgba(255,255,255,.15);
      border-top-color: #aaccff; border-radius: 50%;
      animation: spin .9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-msg { color: #779; margin-top: 16px; font-size: .82rem; }
    #file-area { display: none; margin-top: 20px; text-align: center; }
    #file-area.show { display: block; }
    #file-area p { color: #667; font-size: .76rem; margin-bottom: 10px; }
    #file-btn {
      display: inline-block; background: rgba(255,255,255,.07);
      color: #ccd; border: 1px solid rgba(255,255,255,.18);
      padding: 8px 22px; border-radius: 7px; cursor: pointer;
      font-size: .82rem; transition: background .2s;
    }
    #file-btn:hover { background: rgba(255,255,255,.16); }

    /* === 底部操作提示 === */
    #hint {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,.28); font-size: .68rem;
      pointer-events: none; z-index: 10; letter-spacing: .03em;
    }
  </style>
</head>
<body>

  <!-- 顶部 -->
  <div id="ui-top">
    <div id="title-block">
      <h1>✦ BSC5 亮星星表</h1>
      <div class="sub">Yale Bright Star Catalogue · 5th Edition</div>
    </div>
    <div id="stats">
      已加载 <span id="cnt">0</span> 颗星<br>
      星等范围 <span id="mags">--</span>
    </div>
  </div>

  <!-- 加载 -->
  <div id="loading">
    <div id="spinner"></div>
    <div id="loading-msg">正在加载星表数据…</div>
    <div id="file-area">
      <p>无法自动加载，请手动选择 catalog 文件：</p>
      <button id="file-btn" onclick="document.getElementById('file-inp').click()">📁 选择 catalog 文件</button>
      <input type="file" id="file-inp" accept=".txt,.dat" style="display:none">
    </div>
  </div>

  <!-- 底部提示 -->
  <div id="hint">🖱 左键拖拽旋转 &nbsp;|&nbsp; 滚轮缩放 &nbsp;|&nbsp; 右键平移 &nbsp;|&nbsp; 按 R 重置视角</div>

  <!-- Three.js Import Map -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ==================== DOM ====================
    const cntEl   = document.getElementById('cnt');
    const magsEl  = document.getElementById('mags');
    const loading = document.getElementById('loading');
    const loadMsg = document.getElementById('loading-msg');
    const fileArea= document.getElementById('file-area');
    const fileInp = document.getElementById('file-inp');

    // ==================== 场景初始化 ====================
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000810);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.05, 20);
    camera.position.set(0, 0.4, 3.6);
    camera.lookAt(0, 0, 0);

    // OrbitControls — 鼠标交互
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping       = true;
    controls.dampingFactor       = 0.08;
    controls.minDistance         = 1.05;
    controls.maxDistance         = 9;
    controls.target.set(0, 0, 0);
    controls.rotateSpeed         = 0.45;
    controls.zoomSpeed           = 1.2;
    controls.panSpeed            = 0.6;
    controls.update();

    // ==================== 发光纹理 ====================
    function createGlowTexture(size = 64) {
      const c = document.createElement('canvas');
      c.width = c.height = size;
      const ctx = c.getContext('2d');
      const half = size / 2;
      const g = ctx.createRadialGradient(half, half, half * 0.0, half, half, half);
      g.addColorStop(0.00, 'rgba(255,255,255,1)');
      g.addColorStop(0.04, 'rgba(255,255,255,0.94)');
      g.addColorStop(0.15, 'rgba(255,255,255,0.72)');
      g.addColorStop(0.35, 'rgba(255,255,255,0.28)');
      g.addColorStop(0.60, 'rgba(255,255,255,0.06)');
      g.addColorStop(1.00, 'rgba(255,255,255,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, size, size);
      return new THREE.CanvasTexture(c);
    }
    const glowTex = createGlowTexture();

    // ==================== 星星 Shader 材质 ====================
    const starMat = new THREE.ShaderMaterial({
      uniforms: {
        uTex:   { value: glowTex },
        uScale: { value: 280 },
      },
      vertexShader: /* glsl */ `
        attribute float size;
        attribute vec3  color;
        varying   vec3  vColor;
        uniform   float uScale;
        void main() {
          vec4 mv = modelViewMatrix * vec4(position, 1.0);
          gl_PointSize = size * (uScale / -mv.z);
          gl_PointSize = clamp(gl_PointSize, 0.4, 40.0);
          gl_Position  = projectionMatrix * mv;
          vColor = color;
        }
      `,
      fragmentShader: /* glsl */ `
        uniform sampler2D uTex;
        varying vec3 vColor;
        void main() {
          vec4 t = texture2D(uTex, gl_PointCoord);
          gl_FragColor = vec4(vColor * t.rgb, t.a);
        }
      `,
      blending:    THREE.NormalBlending,
      depthWrite:  false,
      transparent: true,
    });

    // ==================== 解析引擎 ====================
    /**
     * BSC5 固定列位置（0-indexed）:
     *   RA 2000:  line[75..82]  →  "HHMMSS.S"
     *   Dec 2000: line[83..89]  →  "sDDMMSS"
     *   V mag:    line[102..106]→  " F.FF"
     *   B-V:      line[109..113]→  " +F.FF"
     */

    function parseRa(raStr) {
      const s = raStr.trim();
      if (s.length < 7) return NaN;
      const h = +s.substring(0, 2);
      const m = +s.substring(2, 4);
      const sec = +s.substring(4);
      if (isNaN(h) || isNaN(m) || isNaN(sec)) return NaN;
      return (h + m / 60 + sec / 3600) * 15 * Math.PI / 180;
    }

    function parseDec(decStr) {
      const s = decStr.trim();
      if (s.length < 7) return NaN;
      const sign = s[0] === '-' ? -1 : 1;
      const d = +s.substring(1, 3);
      const m = +s.substring(3, 5);
      const sec = +s.substring(5, 7);
      if (isNaN(d) || isNaN(m) || isNaN(sec)) return NaN;
      return sign * (d + m / 60 + sec / 3600) * Math.PI / 180;
    }

    /**
     * B-V 色指数 → 近似黑体 RGB
     */
    function bvToRGB(bv) {
      if (isNaN(bv)) return [0.88, 0.88, 0.94]; // 默认微蓝白

      let t = Math.max(-0.4, Math.min(2.0, bv));
      let r, g, b;

      if (t <= 0.0) {
        // 蓝白 → 白  (O/B/A 型)
        const f = (t + 0.4) / 0.4;
        r = 0.62 + f * 0.38;
        g = 0.72 + f * 0.28;
        b = 0.88 + f * 0.12;
      } else if (t <= 0.5) {
        // 白 → 黄  (A/F 型)
        const f = t / 0.5;
        r = 1.0;
        g = 1.0 - f * 0.28;
        b = 1.0 - f * 0.88;
      } else if (t <= 1.0) {
        // 黄 → 橙  (G 型)
        const f = (t - 0.5) / 0.5;
        r = 1.0;
        g = 0.72 - f * 0.30;
        b = 0.12 - f * 0.10;
      } else if (t <= 1.6) {
        // 橙 → 红  (K 型)
        const f = (t - 1.0) / 0.6;
        r = 1.0 - f * 0.25;
        g = 0.42 - f * 0.30;
        b = 0.02;
      } else {
        // 深红  (M 型)
        const f = (t - 1.6) / 0.4;
        r = 0.75 - f * 0.15;
        g = 0.12 - f * 0.08;
        b = 0.02;
      }
      return [clamp01(r), clamp01(g), clamp01(b)];
    }

    function clamp01(v) { return Math.max(0, Math.min(1, v)); }

    /**
     * 视星等 → 点大小
     * 越亮（星等越小）的点越大
     */
    function magToSize(vmag) {
      if (isNaN(vmag)) return 0.25;
      // 天狼星（-1.46）约 9.5 像素，6 等星约 0.5 像素
      const s = 7.0 * Math.pow(10, -vmag / 5);
      return Math.max(0.2, Math.min(22, s));
    }

    /**
     * 主解析函数
     */
    function parseCatalog(text) {
      const lines = text.split(/\r?\n/).filter(l => l.length > 90);
      const pos = [];   // [x,y,z, x,y,z, ...]
      const col = [];   // [r,g,b, r,g,b, ...]
      const siz = [];   // [s, s, ...]

      let vMin = Infinity, vMax = -Infinity;
      let ok = 0;

      for (const line of lines) {
        try {
          if (line.length < 114) continue;

          const raRaw  = line.substring(75, 83);
          const decRaw = line.substring(83, 90);
          const vRaw   = line.substring(102, 107);
          const bvRaw  = line.substring(109, 114);

          const ra  = parseRa(raRaw);
          const dec = parseDec(decRaw);
          if (isNaN(ra) || isNaN(dec)) continue;

          const vmag = parseFloat(vRaw);
          const bv   = parseFloat(bvRaw);

          // 球坐标 → 笛卡尔（Y 轴 = 北天极，X 轴 = RA=0h 方向）
          const cosD = Math.cos(dec);
          const x = cosD * Math.cos(ra);
          const y = Math.sin(dec);
          const z = cosD * Math.sin(ra);

          pos.push(x, y, z);

          const [cr, cg, cb] = bvToRGB(bv);
          col.push(cr, cg, cb);

          siz.push(magToSize(vmag));

          if (!isNaN(vmag)) {
            if (vmag < vMin) vMin = vmag;
            if (vmag > vMax) vMax = vmag;
          }
          ok++;
        } catch { /* skip malformed line */ }
      }

      console.log(`✅ 成功解析 ${ok} / ${lines.length} 行`);
      cntEl.textContent = ok;
      if (ok > 0) magsEl.textContent = `${vMin.toFixed(1)} ~ ${vMax.toFixed(1)}`;

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
      geo.setAttribute('color',    new THREE.Float32BufferAttribute(col, 3));
      geo.setAttribute('size',     new THREE.Float32BufferAttribute(siz, 1));
      return geo;
    }

    // ==================== 参考线 / 标记 ====================
    function addRefLines() {
      const group = new THREE.Group();

      // 天赤道
      const pts = [];
      const R = 1.005, N = 320;
      for (let i = 0; i <= N; i++) {
        const a = (i / N) * Math.PI * 2;
        pts.push(new THREE.Vector3(Math.cos(a) * R, 0, Math.sin(a) * R));
      }
      group.add(new THREE.Line(
        new THREE.BufferGeometry().setFromPoints(pts),
        new THREE.LineBasicMaterial({ color: 0x223355, transparent: true, opacity: .38, depthTest: true })
      ));

      // 北 / 南天极小球
      const pGeom = new THREE.SphereGeometry(.016, 10, 10);
      const pMat  = new THREE.MeshBasicMaterial({ color: 0x335588 });
      [1, -1].forEach(sign => {
        const m = new THREE.Mesh(pGeom, pMat);
        m.position.set(0, sign * 1.01, 0);
        group.add(m);
      });

      // 春分点方向小标记 (RA=0h, Dec=0°)
      const eq = new THREE.Mesh(
        new THREE.SphereGeometry(.012, 8, 8),
        new THREE.MeshBasicMaterial({ color: 0x557799 })
      );
      eq.position.set(1.01, 0, 0);
      group.add(eq);

      scene.add(group);
    }

    addRefLines();

    // ==================== 数据加载 ====================
    async function loadData() {
      try {
        const resp = await fetch('./catalog');
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const text = await resp.text();

        loadMsg.textContent = '正在解析星表数据…';
        await sleep(30);

        const geo = parseCatalog(text);
        if (geo.attributes.position.count > 0) {
          scene.add(new THREE.Points(geo, starMat));
        } else {
          throw new Error('未解析到任何恒星');
        }

        loading.classList.add('hidden');
      } catch (e) {
        console.warn('自动加载失败:', e.message);
        loadMsg.textContent = '无法自动加载 catalog 文件';
        fileArea.classList.add('show');
      }
    }

    // 手动加载
    fileInp.addEventListener('change', ev => {
      const f = ev.target.files[0];
      if (!f) return;
      loadMsg.textContent = '正在读取…';
      fileArea.classList.remove('show');
      const reader = new FileReader();
      reader.onload = e => {
        loadMsg.textContent = '正在解析星表数据…';
        sleep(30).then(() => {
          const geo = parseCatalog(e.target.result);
          if (geo.attributes.position.count > 0) {
            scene.add(new THREE.Points(geo, starMat));
          }
          loading.classList.add('hidden');
        });
      };
      reader.readAsText(f);
    });

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    // ==================== 键盘快捷键 ====================
    window.addEventListener('keydown', e => {
      const k = e.key.toLowerCase();
      if (k === 'r') {        // 重置
        camera.position.set(0, 0.4, 3.6);
        controls.target.set(0, 0, 0);
        controls.update();
      } else if (k === 'f') { // 前方 (RA=0h)
        camera.position.set(0, 0, 3.8);
        controls.target.set(0, 0, 0);
        controls.update();
      } else if (k === 't') { // 俯视 (北天极)
        camera.position.set(0, 4, 0.01);
        controls.target.set(0, 0, 0);
        controls.update();
      } else if (k === 's') { // 南天极
        camera.position.set(0, -4, 0.01);
        controls.target.set(0, 0, 0);
        controls.update();
      }
    });

    // ==================== 响应式 ====================
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ==================== 渲染循环 ====================
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    // ==================== 启动 ====================
    loadData();
    animate();
    console.log('🌟 BSC5 3D Star Viewer 就绪');
  </script>
</body>
</html>
